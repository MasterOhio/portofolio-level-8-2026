<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Digital Counter</title>
</head>
<body>
    <div class="container">
        <div class="counter-display" id="counter">0</div>
        
        <div class="controls">
            <button class="btn btn-decrement" id="decrementBtn">−</button>
            <button class="btn btn-increment" id="incrementBtn">+</button>
            <button class="btn btn-reset" id="resetBtn">Reset</button>
            <button class="btn btn-random" id="randomBtn">Random</button>
        </div>
        
        <div class="stats">
            <span>Total Clicks: <span id="clickCount">0</span></span>
            <span>Max Value: <span id="maxValue">0</span></span>
        </div>
    </div>
    <script src="script.js"></script>

</html>
